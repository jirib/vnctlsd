socket_validation:           # global defaults
  trusted_uid: libvirt-qemu
  watch_dir: /run/vnctlsd/

commands:
  status:
    cmd: "virsh -c qemu:///system domstate {name}"
    format: raw

  start:
    cmd: "virsh -c qemu:///system start {name}"
    format: raw
    filter:
      type: status
      ok_if: "^Domain .* started"
      message: "{output}"

  reset:
    cmd: "virsh -c qemu:///system reboot {name}"
    format: raw
    filter:
      type: status
      ok_if: "^Domain .* is being rebooted"
      message: "{output}"

  force_reset:
    cmd: "virsh -c qemu:///system reset {name}"
    format: raw

  poweroff:
    cmd: "virsh -c qemu:///system destroy {name}"
    format: raw
    filter:
      type: status
      ok_if: "^Domain .* destroyed"
      message: "{output}"

  snapshots:
    cmd: "virsh -c qemu:///system snapshot-list {name} --as-json"
    format: json
    filter:
      type: list
      items: "[].name"

consoles:                    # explicit definitions (highest priority)
  vm-special:
    type: qemu_unix
    socket: /run/vnctlsd/console-vm-special.sock
    validation:
      trusted_uid: root      # override for this console
    rw: [admin]
    ro: []

console_patterns:            # glob-based (matched when no explicit def)
  - socket_glob: /run/vnctlsd/console-{name}.sock
    type: qemu_unix
    console_name: "{name}"
    validation:
      trusted_uid: libvirt-qemu
    rw: ["{name}"]
    ro: [mentors]

  - socket_glob: /run/vnctlsd/exec-{name}.sock
    type: exec
    console_name: "{name}"
    cmd: "virsh -c qemu:///system console {name} --force"
    rw: ["{name}"]
    ro: [mentors]
