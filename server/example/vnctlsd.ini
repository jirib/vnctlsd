[core]
# socket_path = /run/vnctlsd/vnctlsd.sock
# pidfile     = /run/vnctlsd/vnctlsd.pid
# max_threads = 64

[logging]
# Per-component append-only JSONL logs.  Master opens all files before
# forking; children inherit the fd and never open paths themselves.
# If a path is unset, that component logs to stderr only.
#
# master_log  = /var/log/vnctlsd/master.log
# worker_log  = /var/log/vnctlsd/worker.log
# watcher_log = /var/log/vnctlsd/watcher.log
